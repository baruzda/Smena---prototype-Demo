name: Card rules validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: card-rules-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate card rules
        run: npm run validate:card-rules

      - name: Verify committed generated reports
        run: |
          npm run check:card-rules-generated
          git diff --exit-code -- docs/card-rules/generated

      - name: Run isolated validator fixtures
        run: npm run test:card-rules

      - name: Check deterministic generation
        run: npm run test:card-rules-validator

      - name: Build production bundle
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          E2E_PORT: 4187
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee e2e-output.txt

      - name: Upload E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-diagnostics
          path: |
            e2e-output.txt
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 7
