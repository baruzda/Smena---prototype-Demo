name: Card rules

on:
  pull_request:
    paths:
      - 'docs/card-rules/**'
      - '.codex/rules/card-rules.md'
      - 'scripts/validate-card-rules.mjs'
      - 'package.json'
      - '.github/workflows/card-rules.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run validate:card-rules
      - run: npm run build
